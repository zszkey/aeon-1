name: Aeon Agnes

on:
  workflow_dispatch:
    inputs:
      skill:
        description: 'Skill name'
        required: true
        type: string
      var:
        description: 'Variable'
        required: false
        type: string

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run skill with Agnes
        env:
          AGNES_API_KEY: ${{ secrets.AGNES_API_KEY }}
        run: |
          echo "=== Skill: ${{ inputs.skill }} ==="
          mkdir -p memory/logs outputs .outputs
          python aeon_runner.py run "${{ inputs.skill }}" ${{ inputs.var && format('--var "{0}"', inputs.var) || '' }}

      - name: Commit results
        run: |
          git config user.name "aeonframework"
          git config user.email "aeonframework@proton.me"
          git add -A
          if git diff --staged --quiet; then
            echo "No changes"
            exit 0
          fi
          git commit -m "chore(${{ inputs.skill }}): auto-commit $(date +%Y-%m-%d)"
          for i in 1 2 3 4 5; do
            git pull --rebase origin main 2>/dev/null || true
            git push -u origin HEAD 2>/dev/null && exit 0
            sleep "$i"
          done
