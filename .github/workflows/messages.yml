name: Messages & Scheduler
run-name: "${{ inputs.message && format('msg ({0}): {1}', inputs.source || 'user', inputs.message) || (github.event_name == 'repository_dispatch' && github.event.action != 'cron-tick' && format('msg ({0}): {1}', github.event.action, github.event.client_payload.message)) || 'tick: schedule + poll' }}"

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:
    inputs:
      message:
        description: 'Message to process'
        required: false
        type: string
      source:
        description: 'Message source (telegram, discord, slack)'
        required: false
        type: string
  repository_dispatch:
    types: [telegram-message, discord-message, slack-message, cron-tick]

permissions:
  contents: write
  pull-requests: write
  issues: read
  actions: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NODE_OPTIONS: '--no-deprecation'

# Poll/schedule runs serialize (prevent duplicate ticks). Message runs get unique groups (parallel execution).
concurrency:
  group: ${{ (github.event_name == 'repository_dispatch' || (github.event_name == 'workflow_dispatch' && inputs.message != '')) && format('aeon-msg-{0}', github.run_id) || 'aeon-tick' }}
  cancel-in-progress: false

jobs:
  tick:
    if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.message == '') || (github.event_name == 'repository_dispatch' && github.event.action == 'cron-tick')
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GH_GLOBAL || secrets.GITHUB_TOKEN }}

      - name: Configure git identity
        run: |
          git config user.name "aeonframework"
          git config user.email "aeonframework@proton.me"

      - name: Determine and dispatch scheduled skills
        env:
          GH_TOKEN: ${{ secrets.GH_GLOBAL || secrets.GITHUB_TOKEN }}
        run: |
          MINUTE=$(date -u +%-M)
          HOUR=$(date -u +%-H)
          DOM=$(date -u +%-d)
          MONTH=$(date -u +%-m)
          DOW=$(date -u +%w)
          NOW_ISO=$(date -u +%FT%TZ)
          NOW_EPOCH=$(date -u +%s)

          # Previous hour for catch-up (GitHub Actions cron can miss windows)
          PREV_HOUR=$(( (HOUR + 23) % 24 ))

          # Cron field matcher — supports: *, N, N-M (ranges), N,M (lists), */N, N/step, N-M/step (steps)
          cron_match() {
            local field="$1" value="$2"
            [ "$field" = "*" ] && return 0
            # Step values: */5 or 1-10/2
            if [[ "$field" == */* ]]; then
              local base="${field%/*}" interval="${field#*/}"
              if [ "$base" = "*" ]; then
                [ $((value % interval)) -eq 0 ] && return 0
              elif [[ "$base" == *-* ]]; then
                local lo="${base%-*}" hi="${base#*-}"
                [ "$value" -ge "$lo" ] && [ "$value" -le "$hi" ] && [ $(( (value - lo) % interval )) -eq 0 ] && return 0
              else
                [ "$value" -ge "$base" ] && [ $(( (value - base) % interval )) -eq 0 ] && return 0
              fi
              return 1
            fi
            # Comma-separated list (entries may be ranges or exact values)
            IFS=',' read -ra VALS <<< "$field"
            for v in "${VALS[@]}"; do
              if [[ "$v" == *-* ]]; then
                local lo="${v%-*}" hi="${v#*-}"
                [ "$value" -ge "$lo" ] && [ "$value" -le "$hi" ] && return 0
              else
                [ "$v" = "$value" ] && return 0
              fi
            done
            return 1
          }

          # --- Load cron state ---
          STATE_FILE="memory/cron-state.json"
          if [ -f "$STATE_FILE" ] && jq empty "$STATE_FILE" 2>/dev/null; then
            STATE=$(cat "$STATE_FILE")
          else
            STATE='{}'
          fi

          # --- Parse aeon.yml ---
          declare -A SKILL_ENABLED SKILL_SCHEDULE SKILL_VAR
          SKILL_ORDER=()
          CURRENT_SKILL=""
          while IFS= read -r line; do
            # Inline format: skill-name: { enabled: true, schedule: "..." }
            if [[ "$line" =~ ^\ \ ([a-zA-Z0-9_-]+):\ *\{(.+)\} ]]; then
              CURRENT_SKILL="${BASH_REMATCH[1]}"
              INLINE="${BASH_REMATCH[2]}"
              SKILL_ORDER+=("$CURRENT_SKILL")
              [[ "$INLINE" =~ enabled:\ *true ]] && SKILL_ENABLED["$CURRENT_SKILL"]="true" || SKILL_ENABLED["$CURRENT_SKILL"]="false"
              [[ "$INLINE" =~ schedule:\ *\"([^\"]+)\" ]] && SKILL_SCHEDULE["$CURRENT_SKILL"]="${BASH_REMATCH[1]}"
              [[ "$INLINE" =~ var:\ *\"([^\"]+)\" ]] && SKILL_VAR["$CURRENT_SKILL"]="${BASH_REMATCH[1]}"
              CURRENT_SKILL=""
              continue
            fi
            # Multi-line format
            if [[ "$line" =~ ^\ \ ([a-zA-Z0-9_-]+):\ *$ ]]; then
              CURRENT_SKILL="${BASH_REMATCH[1]}"
              SKILL_ORDER+=("$CURRENT_SKILL")
              SKILL_ENABLED["$CURRENT_SKILL"]="true"
              SKILL_SCHEDULE["$CURRENT_SKILL"]=""
              SKILL_VAR["$CURRENT_SKILL"]=""
            fi
            if [[ "$line" =~ ^\ \ \ \ enabled:\ *false ]] && [ -n "$CURRENT_SKILL" ]; then
              SKILL_ENABLED["$CURRENT_SKILL"]="false"
            fi
            if [[ "$line" =~ ^\ \ \ \ schedule:\ *\"([^\"]+)\" ]] && [ -n "$CURRENT_SKILL" ]; then
              SKILL_SCHEDULE["$CURRENT_SKILL"]="${BASH_REMATCH[1]}"
            fi
            if [[ "$line" =~ ^\ \ \ \ var:\ *\"([^\"]+)\" ]] && [ -n "$CURRENT_SKILL" ]; then
              SKILL_VAR["$CURRENT_SKILL"]="${BASH_REMATCH[1]}"
            fi
          done < aeon.yml

          # --- Match skills ---
          MATCHED=()
          for SKILL in "${SKILL_ORDER[@]}"; do
            [ "${SKILL_ENABLED[$SKILL]}" = "false" ] && continue
            SCHED="${SKILL_SCHEDULE[$SKILL]}"
            [ -z "$SCHED" ] && continue
            [ "$SCHED" = "workflow_dispatch" ] && continue
            [ "$SCHED" = "reactive" ] && continue

            # Read state for this skill
            LAST_STATUS=$(echo "$STATE" | jq -r --arg s "$SKILL" '.[$s].last_status // "none"')
            LAST_DISPATCH=$(echo "$STATE" | jq -r --arg s "$SKILL" '.[$s].last_dispatch // "1970-01-01T00:00:00Z"')
            LAST_DISPATCH_EPOCH=$(date -u -d "$LAST_DISPATCH" +%s 2>/dev/null || echo 0)
            MINUTES_SINCE=$(( (NOW_EPOCH - LAST_DISPATCH_EPOCH) / 60 ))

            # --- Retry failed skills (after 30 min cooldown) ---
            if [ "$LAST_STATUS" = "failed" ] && [ "$MINUTES_SINCE" -ge 30 ]; then
              echo "Retrying failed skill: $SKILL (failed ${MINUTES_SINCE}m ago)"
              MATCHED+=("$SKILL")
              continue
            fi

            # --- Normal cron matching ---
            IFS=' ' read -r C_MIN C_HOUR C_DOM C_MONTH C_DOW <<< "$SCHED"

            cron_match "$C_DOM" "$DOM" || continue
            cron_match "$C_MONTH" "$MONTH" || continue
            cron_match "$C_DOW" "$DOW" || continue

            SHOULD_RUN=false
            if cron_match "$C_HOUR" "$HOUR"; then
              if [ "$C_MIN" = "*" ] || [ "$C_MIN" -le "$MINUTE" ]; then
                SHOULD_RUN=true
              fi
            fi
            # Catch-up: schedule matched previous hour but was missed.
            # Only catch up when last dispatch predates the scheduled fire time —
            # prevents the same skill from firing twice when a tick also lands in PREV_HOUR+1.
            if [ "$SHOULD_RUN" = "false" ] && cron_match "$C_HOUR" "$PREV_HOUR"; then
              if [[ "$C_MIN" =~ ^[0-9]+$ ]]; then
                SCHED_EPOCH=$(date -u -d "$(date -u +%Y-%m-%d) ${PREV_HOUR}:$(printf '%02d' "$C_MIN"):00 UTC" +%s 2>/dev/null || echo 0)
                [ "$LAST_DISPATCH_EPOCH" -lt "$SCHED_EPOCH" ] && SHOULD_RUN=true
              else
                SHOULD_RUN=true
              fi
            fi

            [ "$SHOULD_RUN" = "false" ] && continue

            # --- Dedup: skip if dispatched recently ---
            DEDUP_WINDOW=90
            if [[ "$C_MIN" == */* ]]; then
              INTERVAL="${C_MIN#*/}"
              DEDUP_WINDOW=$((INTERVAL * 2 + 5))
            fi

            if [ "$MINUTES_SINCE" -lt "$DEDUP_WINDOW" ]; then
              echo "Skipping $SKILL (dispatched ${MINUTES_SINCE}m ago, window: ${DEDUP_WINDOW}m)"
              continue
            fi

            MATCHED+=("$SKILL")
            echo "Matched: $SKILL (schedule: $SCHED)"
          done

          if [ ${#MATCHED[@]} -eq 0 ]; then
            echo "No skills matched"
          fi

          # --- Parse depends_on from SKILL.md frontmatter ---
          declare -A SKILL_DEPS
          for SKILL in "${MATCHED[@]}"; do
            SKILL_FILE="skills/${SKILL}/SKILL.md"
            if [ -f "$SKILL_FILE" ]; then
              DEPS=$(sed -n '/^---/,/^---/p' "$SKILL_FILE" | \
                grep -oP 'depends_on:\s*\[([^\]]*)\]' | \
                sed 's/depends_on:\s*\[//;s/\]//' | \
                tr -d ' ' || true)
              [ -n "$DEPS" ] && SKILL_DEPS["$SKILL"]="$DEPS"
            fi
          done

          # --- Order dispatches: dependencies first, then dependents ---
          DEPS_FIRST=()
          DEPS_LAST=()
          for SKILL in "${MATCHED[@]}"; do
            if [ -n "${SKILL_DEPS[$SKILL]:-}" ]; then
              DEPS_LAST+=("$SKILL")
            else
              DEPS_FIRST+=("$SKILL")
            fi
          done
          ORDERED=("${DEPS_FIRST[@]}" "${DEPS_LAST[@]}")

          # --- Parse chains from aeon.yml ---
          declare -A CHAIN_SCHEDULE CHAIN_SKILLS
          CHAIN_ORDER=()
          CHAIN_COVERED_SKILLS=()
          IN_CHAINS=false
          CURRENT_CHAIN=""
          IN_STEPS=false
          while IFS= read -r line; do
            if [[ "$line" =~ ^chains: ]]; then
              IN_CHAINS=true
              continue
            fi
            $IN_CHAINS && [[ "$line" =~ ^[a-z] ]] && IN_CHAINS=false
            $IN_CHAINS || continue

            if [[ "$line" =~ ^\ \ ([a-zA-Z0-9_-]+): ]]; then
              CURRENT_CHAIN="${BASH_REMATCH[1]}"
              CHAIN_ORDER+=("$CURRENT_CHAIN")
              IN_STEPS=false
              continue
            fi
            [ -z "$CURRENT_CHAIN" ] && continue
            if [[ "$line" =~ schedule:\ *\"([^\"]+)\" ]]; then
              CHAIN_SCHEDULE["$CURRENT_CHAIN"]="${BASH_REMATCH[1]}"
            fi
            if [[ "$line" =~ parallel:\ *\[([^\]]+)\] ]]; then
              CHAIN_SKILLS["$CURRENT_CHAIN"]+="$(echo "${BASH_REMATCH[1]}" | tr -d ' '),"
            elif [[ "$line" =~ skill:\ *([a-zA-Z0-9_-]+) ]]; then
              CHAIN_SKILLS["$CURRENT_CHAIN"]+="${BASH_REMATCH[1]},"
            fi
          done < aeon.yml

          # Match chains against current time
          MATCHED_CHAINS=()
          for CH in "${CHAIN_ORDER[@]}"; do
            SCHED="${CHAIN_SCHEDULE[$CH]:-}"
            [ -z "$SCHED" ] && continue

            IFS=' ' read -r C_MIN C_HOUR C_DOM C_MONTH C_DOW <<< "$SCHED"
            cron_match "$C_DOM" "$DOM" || continue
            cron_match "$C_MONTH" "$MONTH" || continue
            cron_match "$C_DOW" "$DOW" || continue

            CHAIN_KEY="chain:$CH"
            LAST_DISPATCH=$(echo "$STATE" | jq -r --arg s "$CHAIN_KEY" '.[$s].last_dispatch // "1970-01-01T00:00:00Z"')
            LAST_DISPATCH_EPOCH=$(date -u -d "$LAST_DISPATCH" +%s 2>/dev/null || echo 0)
            MINUTES_SINCE=$(( (NOW_EPOCH - LAST_DISPATCH_EPOCH) / 60 ))

            SHOULD_RUN=false
            if cron_match "$C_HOUR" "$HOUR"; then
              if [ "$C_MIN" = "*" ] || [ "$C_MIN" -le "$MINUTE" ]; then
                SHOULD_RUN=true
              fi
            fi
            # Catch-up: only if last dispatch predates today's scheduled fire time
            if [ "$SHOULD_RUN" = "false" ] && cron_match "$C_HOUR" "$PREV_HOUR"; then
              if [[ "$C_MIN" =~ ^[0-9]+$ ]]; then
                SCHED_EPOCH=$(date -u -d "$(date -u +%Y-%m-%d) ${PREV_HOUR}:$(printf '%02d' "$C_MIN"):00 UTC" +%s 2>/dev/null || echo 0)
                [ "$LAST_DISPATCH_EPOCH" -lt "$SCHED_EPOCH" ] && SHOULD_RUN=true
              else
                SHOULD_RUN=true
              fi
            fi
            [ "$SHOULD_RUN" = "false" ] && continue

            if [ "$MINUTES_SINCE" -lt 90 ]; then
              echo "Skipping chain $CH (dispatched ${MINUTES_SINCE}m ago)"
              continue
            fi

            MATCHED_CHAINS+=("$CH")
            IFS=',' read -ra CH_SKILLS <<< "${CHAIN_SKILLS[$CH]}"
            for s in "${CH_SKILLS[@]}"; do
              [ -n "$s" ] && CHAIN_COVERED_SKILLS+=("$s")
            done
            echo "Matched chain: $CH (schedule: $SCHED)"
          done

          # --- Dispatch chains ---
          for CH in "${MATCHED_CHAINS[@]}"; do
            echo "Dispatching chain: $CH"
            gh workflow run chain-runner.yml -f chain="$CH"
            STATE=$(echo "$STATE" | jq --arg s "chain:$CH" --arg ts "$NOW_ISO" \
              '.[$s].last_dispatch = $ts | .[$s].last_status = "dispatched"')
            sleep 2
          done

          # --- Filter standalone skills: skip if covered by a chain dispatching now ---
          FILTERED_ORDERED=()
          for SKILL in "${ORDERED[@]}"; do
            SKIP=false
            for covered in "${CHAIN_COVERED_SKILLS[@]}"; do
              if [ "$SKILL" = "$covered" ]; then
                echo "Skipping standalone $SKILL (covered by chain)"
                SKIP=true
                break
              fi
            done
            $SKIP || FILTERED_ORDERED+=("$SKILL")
          done
          ORDERED=("${FILTERED_ORDERED[@]}")

          # --- Evaluate reactive triggers ---
          # Parse reactive section from aeon.yml
          IN_REACTIVE=false
          REACTIVE_SKILL=""
          declare -A REACTIVE_TRIGGERS
          while IFS= read -r line; do
            if [[ "$line" =~ ^reactive: ]]; then
              IN_REACTIVE=true
              continue
            fi
            $IN_REACTIVE && [[ "$line" =~ ^[a-z] ]] && ! [[ "$line" =~ ^[[:space:]] ]] && IN_REACTIVE=false
            $IN_REACTIVE || continue
            [[ "$line" =~ ^\ *# ]] && continue
            if [[ "$line" =~ ^\ \ ([a-zA-Z0-9_-]+): ]]; then
              REACTIVE_SKILL="${BASH_REMATCH[1]}"
              continue
            fi
            if [ -n "$REACTIVE_SKILL" ] && [[ "$line" =~ on:\ *\"([^\"]+)\".*when:\ *\"([^\"]+)\" ]]; then
              ON="${BASH_REMATCH[1]}"
              WHEN="${BASH_REMATCH[2]}"
              REACTIVE_TRIGGERS["$REACTIVE_SKILL"]+="${ON}:${WHEN};"
            fi
          done < aeon.yml

          # Check reactive triggers against cron state
          for RSKILL in "${!REACTIVE_TRIGGERS[@]}"; do
            IFS=';' read -ra RULES <<< "${REACTIVE_TRIGGERS[$RSKILL]}"
            for rule in "${RULES[@]}"; do
              [ -z "$rule" ] && continue
              ON="${rule%%:*}"
              WHEN="${rule#*:}"

              # Check condition against all skills (or specific source skill)
              TRIGGERED=false
              for CHECK_SKILL in "${SKILL_ORDER[@]}"; do
                [ "${SKILL_ENABLED[$CHECK_SKILL]}" = "false" ] && continue
                [ "$ON" != "*" ] && [ "$ON" != "$CHECK_SKILL" ] && continue

                if [[ "$WHEN" =~ consecutive_failures\ *\>=\ *([0-9]+) ]]; then
                  THRESHOLD="${BASH_REMATCH[1]}"
                  CONSEC=$(echo "$STATE" | jq -r --arg s "$CHECK_SKILL" '.[$s].consecutive_failures // 0')
                  if [ "$CONSEC" -ge "$THRESHOLD" ]; then
                    echo "Reactive trigger: $RSKILL (${CHECK_SKILL} has ${CONSEC} consecutive failures >= ${THRESHOLD})"
                    TRIGGERED=true
                    break
                  fi
                elif [[ "$WHEN" =~ last_status\ *=\ *([a-z]+) ]]; then
                  EXPECTED="${BASH_REMATCH[1]}"
                  ACTUAL=$(echo "$STATE" | jq -r --arg s "$CHECK_SKILL" '.[$s].last_status // "none"')
                  if [ "$ACTUAL" = "$EXPECTED" ]; then
                    echo "Reactive trigger: $RSKILL (${CHECK_SKILL} last_status = ${EXPECTED})"
                    TRIGGERED=true
                    break
                  fi
                fi
              done

              if [ "$TRIGGERED" = "true" ]; then
                # Dedup check
                LAST_DISPATCH=$(echo "$STATE" | jq -r --arg s "$RSKILL" '.[$s].last_dispatch // "1970-01-01T00:00:00Z"')
                LAST_DISPATCH_EPOCH=$(date -u -d "$LAST_DISPATCH" +%s 2>/dev/null || echo 0)
                MINUTES_SINCE=$(( (NOW_EPOCH - LAST_DISPATCH_EPOCH) / 60 ))
                if [ "$MINUTES_SINCE" -ge 90 ]; then
                  ORDERED+=("$RSKILL")
                else
                  echo "Skipping reactive $RSKILL (dispatched ${MINUTES_SINCE}m ago)"
                fi
                break
              fi
            done
          done

          # --- Dispatch ---
          DISPATCHED_DEPS=false
          for SKILL in "${ORDERED[@]}"; do
            if [ -n "${SKILL_DEPS[$SKILL]:-}" ] && [ "$DISPATCHED_DEPS" = "false" ]; then
              DISPATCHED_DEPS=true
              echo "Waiting 5s before dispatching skills with dependencies..."
              sleep 5
            fi

            VAR="${SKILL_VAR[$SKILL]:-}"
            if [ -n "$VAR" ]; then
              echo "Dispatching: $SKILL (var: $VAR)${SKILL_DEPS[$SKILL]:+ [depends_on: ${SKILL_DEPS[$SKILL]}]}"
              gh workflow run aeon.yml -f skill="$SKILL" -f var="$VAR"
            else
              echo "Dispatching: $SKILL${SKILL_DEPS[$SKILL]:+ [depends_on: ${SKILL_DEPS[$SKILL]}]}"
              gh workflow run aeon.yml -f skill="$SKILL"
            fi

            STATE=$(echo "$STATE" | jq --arg s "$SKILL" --arg ts "$NOW_ISO" \
              '.[$s].last_dispatch = $ts | .[$s].last_status = "dispatched"')

            sleep 2
          done

          # --- Commit updated state ---
          mkdir -p memory
          echo "$STATE" | jq '.' > "$STATE_FILE"

          git add "$STATE_FILE"
          if git diff --staged --quiet; then
            echo "No state changes"
          else
            git commit -m "chore(scheduler): update cron state"
            for i in 1 2 3 4 5; do
              if git pull --rebase origin main 2>/dev/null && git push -u origin HEAD 2>/dev/null; then
                echo "State committed on attempt $i"
                break
              fi
              git rebase --abort 2>/dev/null || true
              git reset --soft HEAD~1 2>/dev/null || true
              git checkout -- "$STATE_FILE" 2>/dev/null || true
              git pull origin main 2>/dev/null || true

              if [ -f "$STATE_FILE" ] && jq empty "$STATE_FILE" 2>/dev/null; then
                MERGED=$(cat "$STATE_FILE")
              else
                MERGED='{}'
              fi
              for SKILL in "${MATCHED[@]}"; do
                MERGED=$(echo "$MERGED" | jq --arg s "$SKILL" --arg ts "$NOW_ISO" \
                  '.[$s].last_dispatch = $ts | .[$s].last_status = "dispatched"')
              done
              echo "$MERGED" | jq '.' > "$STATE_FILE"
              git add "$STATE_FILE"
              git diff --staged --quiet && { echo "State already up to date after merge"; break; }
              git commit -m "chore(scheduler): update cron state"
              sleep "$i"
            done
          fi

      - name: Collect and dispatch messages
        env:
          GH_TOKEN: ${{ secrets.GH_GLOBAL || secrets.GITHUB_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_CHANNEL_ID: ${{ secrets.DISCORD_CHANNEL_ID }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
        run: |
          MESSAGES='[]'

          # --- Telegram (collect ALL pending updates) ---
          if [ -n "${TELEGRAM_BOT_TOKEN:-}" ] && [ -n "${TELEGRAM_CHAT_ID:-}" ]; then
            # A webhook and getUpdates are mutually exclusive: once a webhook is
            # set (instant mode, see webhook/), getUpdates returns 409. Detect it
            # and skip polling — the Worker delivers via repository_dispatch.
            WEBHOOK_URL=$(curl -s "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/getWebhookInfo" | jq -r '.result.url // empty')
            if [ -n "$WEBHOOK_URL" ]; then
              echo "Telegram webhook active — skipping poll (instant mode delivers via repository_dispatch)"
            else
              RESPONSE=$(curl -s "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/getUpdates?timeout=0&allowed_updates=%5B%22message%22%5D")
              COUNT=$(echo "$RESPONSE" | jq '.result | length')
              MAX_UPDATE_ID=""
              TG_MESSAGES='[]'

              for ((i=0; i<COUNT; i++)); do
                TEXT=$(echo "$RESPONSE" | jq -r ".result[$i].message.text // empty")
                CHAT=$(echo "$RESPONSE" | jq -r ".result[$i].message.chat.id // empty")
                UPDATE_ID=$(echo "$RESPONSE" | jq -r ".result[$i].update_id // empty")

                if [ -n "$TEXT" ] && [ "$CHAT" = "$TELEGRAM_CHAT_ID" ]; then
                  TG_MESSAGES=$(echo "$TG_MESSAGES" | jq --arg src "telegram" --arg txt "$TEXT" '. + [{source: $src, text: $txt}]')
                  echo "Telegram: $TEXT"
                fi
                MAX_UPDATE_ID="$UPDATE_ID"
              done

              # Acknowledge updates BEFORE queuing them for dispatch, and only
              # enqueue once Telegram confirms the offset advanced (ok:true) — a
              # re-poll then can't re-read them. If the ack fails, leave the
              # messages pending for the next tick rather than dispatch updates
              # that could be re-read and processed twice.
              if [ -n "$MAX_UPDATE_ID" ]; then
                ACK_OK=$(curl -s "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/getUpdates?offset=$((MAX_UPDATE_ID + 1))" | jq -r '.ok // false')
                if [ "$ACK_OK" = "true" ]; then
                  MESSAGES=$(echo "$MESSAGES" | jq --argjson tg "$TG_MESSAGES" '. + $tg')
                else
                  PENDING=$(echo "$TG_MESSAGES" | jq 'length')
                  [ "$PENDING" -gt 0 ] && echo "::warning::Telegram offset ack failed — leaving $PENDING message(s) pending to avoid double-processing"
                fi
              fi
            fi
          fi

          # --- Discord (collect ALL unprocessed messages) ---
          if [ -n "${DISCORD_BOT_TOKEN:-}" ] && [ -n "${DISCORD_CHANNEL_ID:-}" ]; then
            RESPONSE=$(curl -s -H "Authorization: Bot $DISCORD_BOT_TOKEN" \
              "https://discord.com/api/v10/channels/$DISCORD_CHANNEL_ID/messages?limit=10")
            COUNT=$(echo "$RESPONSE" | jq 'if type == "array" then length else 0 end')

            for ((i=0; i<COUNT; i++)); do
              CONTENT=$(echo "$RESPONSE" | jq -r ".[$i].content // empty")
              IS_BOT=$(echo "$RESPONSE" | jq -r ".[$i].author.bot // false")
              MSG_ID=$(echo "$RESPONSE" | jq -r ".[$i].id // empty")
              HAS_CHECK=$(echo "$RESPONSE" | jq -r "[.[$i].reactions[]? | select(.emoji.name == \"✅\") | .me] | any")

              if [ -n "$CONTENT" ] && [ "$IS_BOT" != "true" ] && [ "$HAS_CHECK" != "true" ]; then
                curl -s -X PUT -H "Authorization: Bot $DISCORD_BOT_TOKEN" \
                  "https://discord.com/api/v10/channels/$DISCORD_CHANNEL_ID/messages/$MSG_ID/reactions/%E2%9C%85/@me" > /dev/null
                MESSAGES=$(echo "$MESSAGES" | jq --arg src "discord" --arg txt "$CONTENT" '. + [{source: $src, text: $txt}]')
                echo "Discord: $CONTENT"
              fi
            done
          fi

          # --- Slack (collect ALL unprocessed messages) ---
          if [ -n "${SLACK_BOT_TOKEN:-}" ] && [ -n "${SLACK_CHANNEL_ID:-}" ]; then
            RESPONSE=$(curl -s -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
              "https://slack.com/api/conversations.history?channel=$SLACK_CHANNEL_ID&limit=10")
            COUNT=$(echo "$RESPONSE" | jq '.messages | length')

            for ((i=0; i<COUNT; i++)); do
              TEXT=$(echo "$RESPONSE" | jq -r ".messages[$i].text // empty")
              TS=$(echo "$RESPONSE" | jq -r ".messages[$i].ts // empty")
              BOT_ID=$(echo "$RESPONSE" | jq -r ".messages[$i].bot_id // empty")
              HAS_CHECK=$(echo "$RESPONSE" | jq -r ".messages[$i].reactions[]? | select(.name == \"white_check_mark\") | .name // empty")

              if [ -n "$TEXT" ] && [ -z "$BOT_ID" ] && [ -z "$HAS_CHECK" ]; then
                curl -s -X POST -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
                  -H "Content-Type: application/json" \
                  -d "$(jq -n --arg ch "$SLACK_CHANNEL_ID" --arg ts "$TS" \
                    '{channel: $ch, timestamp: $ts, name: "white_check_mark"}')" \
                  "https://slack.com/api/reactions.add" > /dev/null
                MESSAGES=$(echo "$MESSAGES" | jq --arg src "slack" --arg txt "$TEXT" '. + [{source: $src, text: $txt}]')
                echo "Slack: $TEXT"
              fi
            done
          fi

          # Dispatch each message as a separate workflow run
          MSG_COUNT=$(echo "$MESSAGES" | jq 'length')
          echo "Found $MSG_COUNT message(s)"

          for ((i=0; i<MSG_COUNT; i++)); do
            SOURCE=$(echo "$MESSAGES" | jq -r ".[$i].source")
            TEXT=$(echo "$MESSAGES" | jq -r ".[$i].text")
            echo "Dispatching [$SOURCE]: $TEXT"
            gh workflow run messages.yml -R "$GITHUB_REPOSITORY" -f source="$SOURCE" -f message="$TEXT"
          done

          if [ "$MSG_COUNT" -eq 0 ]; then
            echo "No new messages"
          fi

  run:
    if: github.event_name == 'repository_dispatch' || (github.event_name == 'workflow_dispatch' && inputs.message != '')
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Extract message
        id: msg
        env:
          _INPUT_MESSAGE: ${{ inputs.message }}
          _INPUT_SOURCE: ${{ inputs.source }}
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            MESSAGE=$(echo '${{ toJson(github.event.client_payload.message) }}' | jq -r '.')
            TYPE="${{ github.event.action }}"
            SOURCE="webhook"
            case "$TYPE" in
              telegram-message) SOURCE="telegram" ;;
              discord-message) SOURCE="discord" ;;
              slack-message) SOURCE="slack" ;;
            esac
          else
            MESSAGE="$_INPUT_MESSAGE"
            SOURCE="$_INPUT_SOURCE"
          fi

          if [ -n "$MESSAGE" ] && [ "$MESSAGE" != "null" ]; then
            echo "source=$SOURCE" >> "$GITHUB_OUTPUT"
            echo "message<<ENDOFMESSAGE" >> "$GITHUB_OUTPUT"
            echo "$MESSAGE" >> "$GITHUB_OUTPUT"
            echo "ENDOFMESSAGE" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout repo
        if: steps.msg.outputs.source != ''
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GH_GLOBAL || secrets.GITHUB_TOKEN }}

      - name: Configure git identity
        if: steps.msg.outputs.source != ''
        run: |
          git config user.name "aeonframework"
          git config user.email "aeonframework@proton.me"

      - name: Setup Node.js
        if: steps.msg.outputs.source != ''
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Install Claude Code
        if: steps.msg.outputs.source != ''
        # Pinned for supply-chain safety — keep in sync with aeon.yml's pin.
        run: npm install -g @anthropic-ai/claude-code@2.1.168

      - name: Run
        id: run
        if: steps.msg.outputs.source != ''
        env:
          # Full secrets context — lets .mcp.json reference ANY repo secret as
          # ${NAME} with no per-name env wiring. Consumed by the MCP preflight
          # below, then unset before Claude runs so it never reaches skill code.
          ALL_SECRETS: ${{ toJSON(secrets) }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          ANTHROPIC_BASE_URL: ${{ vars.ANTHROPIC_BASE_URL }}
          BANKR_LLM_KEY: ${{ secrets.BANKR_LLM_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          USEPOD_TOKEN: ${{ secrets.USEPOD_TOKEN }}
          VENICE_API_KEY: ${{ secrets.VENICE_API_KEY }}
          SURPLUS_API_KEY: ${{ secrets.SURPLUS_API_KEY }}
          OPENROUTER_MODEL: ${{ vars.OPENROUTER_MODEL }}
          OPENROUTER_MODEL_SONNET: ${{ vars.OPENROUTER_MODEL_SONNET }}
          OPENROUTER_MODEL_HAIKU: ${{ vars.OPENROUTER_MODEL_HAIKU }}
          USEPOD_MODEL: ${{ vars.USEPOD_MODEL }}
          USEPOD_MODEL_SONNET: ${{ vars.USEPOD_MODEL_SONNET }}
          USEPOD_MODEL_HAIKU: ${{ vars.USEPOD_MODEL_HAIKU }}
          VENICE_MODEL: ${{ vars.VENICE_MODEL }}
          VENICE_CLEANCACHE: ${{ vars.VENICE_CLEANCACHE }}
          SURPLUS_MODEL: ${{ vars.SURPLUS_MODEL }}
          CCR_LOG: ${{ vars.CCR_LOG }}
          GITHUB_TOKEN: ${{ secrets.GH_GLOBAL || secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GH_GLOBAL || secrets.GITHUB_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_CHANNEL_ID: ${{ secrets.DISCORD_CHANNEL_ID }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          COINGECKO_API_KEY: ${{ secrets.COINGECKO_API_KEY }}
          ALCHEMY_API_KEY: ${{ secrets.ALCHEMY_API_KEY }}
          _MSG_SOURCE: ${{ steps.msg.outputs.source }}
          _MSG_MESSAGE: ${{ steps.msg.outputs.message }}
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          CONFIG_MODEL=$(grep -E '^model:' aeon.yml | sed 's/^model: *//' | tr -d ' ')
          MODEL="${CONFIG_MODEL:-claude-opus-4-8}"

          # AI Gateway routing — same path as aeon.yml's Run steps
          GATEWAY=$(grep -A1 '^gateway:' aeon.yml | grep 'provider:' | sed 's/.*provider:[[:space:]]*//' | sed "s/[\"' ]//g" || true)
          GATEWAY="${GATEWAY:-auto}"
          source "${GITHUB_WORKSPACE}/scripts/llm-gateway.sh"

          cat > ./notify << 'NOTIFY_SCRIPT'
          #!/usr/bin/env bash
          set -euo pipefail
          MSG="$1"
          if [ -n "${TELEGRAM_BOT_TOKEN:-}" ] && [ -n "${TELEGRAM_CHAT_ID:-}" ]; then
            curl -sf -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              -H "Content-Type: application/json" \
              -d "$(jq -n --arg chat "$TELEGRAM_CHAT_ID" --arg text "$MSG" '{chat_id: $chat, text: $text, parse_mode: "Markdown"}')" > /dev/null || true
          fi
          if [ -n "${DISCORD_WEBHOOK_URL:-}" ]; then
            curl -sf -X POST "$DISCORD_WEBHOOK_URL" \
              -H "Content-Type: application/json" \
              -d "$(jq -n --arg text "$MSG" '{content: $text}')" > /dev/null || true
          fi
          if [ -n "${SLACK_WEBHOOK_URL:-}" ]; then
            curl -sf -X POST "$SLACK_WEBHOOK_URL" \
              -H "Content-Type: application/json" \
              -d "$(jq -n --arg text "$MSG" '{text: $text}')" > /dev/null || true
          fi
          NOTIFY_SCRIPT
          chmod +x ./notify

          ALLOWED="Read,Write,Edit,Glob,Grep,WebFetch,WebSearch"
          ALLOWED="$ALLOWED,Bash(curl:*),Bash(gh:*),Bash(git:*),Bash(jq:*)"
          ALLOWED="$ALLOWED,Bash(./notify:*)"
          ALLOWED="$ALLOWED,Bash(mkdir:*),Bash(ls:*),Bash(cat:*),Bash(chmod:*)"
          ALLOWED="$ALLOWED,Bash(date:*),Bash(echo:*),Bash(node:*),Bash(npm:*),Bash(npx:*)"
          ALLOWED="$ALLOWED,Bash(head:*),Bash(tail:*),Bash(wc:*),Bash(sort:*),Bash(grep:*)"

          # MCP (opt-in): when a project .mcp.json exists, load it for this run
          # and allow each server's tools. No-op when the file is absent. Any
          # ${VAR} the config references is auto-resolved from this repo's secrets
          # (ALL_SECRETS) — set the secret in the dashboard and it just works, no
          # per-name workflow wiring. If a referenced secret genuinely isn't set,
          # skip MCP with a warning rather than break the run on a parse failure.
          MCP_FLAGS=()
          if [ -f .mcp.json ] && jq -e '.mcpServers' .mcp.json >/dev/null 2>&1; then
            MCP_MISSING=""
            # ALL_SECRETS is toJSON(secrets). Guard the empty case via a temp var —
            # NOT the inline ${ALL_SECRETS:-{}} form: bash closes ${...} at the first
            # '}', so the default is just '{' and a stray '}' gets appended to the
            # value, corrupting the JSON (jq: parse error "Unmatched '}'").
            SECRETS_JSON="${ALL_SECRETS:-}"; [ -z "$SECRETS_JSON" ] && SECRETS_JSON='{}'
            for v in $(grep -oE '\$\{[A-Z_][A-Z0-9_]*\}' .mcp.json | sed -E 's/[${}]//g' | sort -u); do
              [ -n "${!v:-}" ] && continue                                  # already in env (built-in)
              val="$(jq -r --arg k "$v" '.[$k] // empty' <<<"$SECRETS_JSON")"
              if [ -n "$val" ]; then export "$v=$val"; else MCP_MISSING="$MCP_MISSING $v"; fi
            done
            if [ -n "$MCP_MISSING" ]; then
              echo "::warning::.mcp.json references secret(s) not set:${MCP_MISSING} — add them in the dashboard; the next run picks them up. Skipping MCP this run."
            else
              for srv in $(jq -r '.mcpServers | keys[]' .mcp.json); do
                ALLOWED="$ALLOWED,mcp__${srv}"
              done
              MCP_FLAGS=(--mcp-config .mcp.json --strict-mcp-config)
              echo "MCP enabled: $(jq -r '.mcpServers | keys | join(", ")' .mcp.json)"
            fi
          fi
          unset ALL_SECRETS   # drop the secrets blob before any skill/Claude code runs

          SOURCE="$_MSG_SOURCE"
          MESSAGE="$_MSG_MESSAGE"
          PROMPT="Today is $TODAY. You received this message from the user on ${SOURCE}:

          \"$MESSAGE\"

          Read memory/MEMORY.md for context. Look at the available skills in skills/ to understand what you can do.

          Interpret what the user wants and act on it:
          - If they want you to run a skill (e.g. \"write an article about X\", \"send me a digest\"), read that skill file and execute it.
          - If they want information or have a question, research it and respond.
          - If they want you to remember something, update memory/MEMORY.md.
          - For anything else, do your best and explain what you did.

          Always send your response back via ./notify so the user sees it."
          if ! CLAUDE_OUTPUT=$(echo "$PROMPT" | claude -p - \
            --model "$MODEL" --allowedTools "$ALLOWED" \
            "${MCP_FLAGS[@]}" --output-format json 2>&1); then
            echo "::error::Claude CLI failed. Output: $CLAUDE_OUTPUT"
            exit 1
          fi

          echo "$CLAUDE_OUTPUT" | jq -r '.result // empty'

          INPUT_TOKENS=$(echo "$CLAUDE_OUTPUT" | jq '.usage.input_tokens // 0')
          OUTPUT_TOKENS=$(echo "$CLAUDE_OUTPUT" | jq '.usage.output_tokens // 0')
          CACHE_READ=$(echo "$CLAUDE_OUTPUT" | jq '.usage.cache_read_input_tokens // 0')
          CACHE_CREATION=$(echo "$CLAUDE_OUTPUT" | jq '.usage.cache_creation_input_tokens // 0')
          TOTAL_TOKENS=$((INPUT_TOKENS + OUTPUT_TOKENS))

          echo "SKILL_INPUT_TOKENS=$INPUT_TOKENS" >> "$GITHUB_OUTPUT"
          echo "SKILL_OUTPUT_TOKENS=$OUTPUT_TOKENS" >> "$GITHUB_OUTPUT"
          echo "SKILL_CACHE_READ_TOKENS=$CACHE_READ" >> "$GITHUB_OUTPUT"
          echo "SKILL_CACHE_CREATION_TOKENS=$CACHE_CREATION" >> "$GITHUB_OUTPUT"
          echo "SKILL_TOTAL_TOKENS=$TOTAL_TOKENS" >> "$GITHUB_OUTPUT"

          echo "::notice::Token usage — input: $INPUT_TOKENS, output: $OUTPUT_TOKENS, cache_read: $CACHE_READ, cache_creation: $CACHE_CREATION, total: $TOTAL_TOKENS"

      # Sidecar gateway logs die with the VM — surface them in the job log on
      # failure (set the CCR_LOG=true repo variable for request-level detail).
      # The ccr config.json is deliberately NOT printed (it embeds the provider key).
      - name: Sidecar logs (on failure)
        if: failure()
        run: |
          found=0
          for f in "$HOME"/.claude-code-router/logs/*.log "$HOME"/.claude-code-router/*.log; do
            [ -f "$f" ] || continue
            found=1
            echo "===== ${f} (last 200 lines) ====="
            tail -n 200 "$f"
          done
          if [ "$found" -eq 0 ]; then echo "No claude-code-router logs found (gateway was not a sidecar provider, or it never started)."; fi

      - name: Log token usage
        if: steps.msg.outputs.source != ''
        env:
          _LOG_SOURCE: ${{ steps.msg.outputs.source }}
          _LOG_INPUT: ${{ steps.run.outputs.SKILL_INPUT_TOKENS }}
          _LOG_OUTPUT: ${{ steps.run.outputs.SKILL_OUTPUT_TOKENS }}
          _LOG_CACHE_READ: ${{ steps.run.outputs.SKILL_CACHE_READ_TOKENS }}
          _LOG_CACHE_CREATION: ${{ steps.run.outputs.SKILL_CACHE_CREATION_TOKENS }}
          _LOG_TOTAL: ${{ steps.run.outputs.SKILL_TOTAL_TOKENS }}
        run: |
          SOURCE="$_LOG_SOURCE"
          INPUT="$_LOG_INPUT"
          OUTPUT="$_LOG_OUTPUT"
          CACHE_READ="$_LOG_CACHE_READ"
          CACHE_CREATION="$_LOG_CACHE_CREATION"
          TOTAL="$_LOG_TOTAL"
          echo "## Token Usage: message ($SOURCE)" >> "$GITHUB_STEP_SUMMARY"
          echo "| Metric | Tokens |" >> "$GITHUB_STEP_SUMMARY"
          echo "|--------|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Input | $INPUT |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Output | $OUTPUT |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Cache read | $CACHE_READ |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Cache creation | $CACHE_CREATION |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Total** | **$TOTAL** |" >> "$GITHUB_STEP_SUMMARY"

      - name: Commit results
        if: steps.msg.outputs.source != ''
        env:
          _COMMIT_SOURCE: ${{ steps.msg.outputs.source }}
        run: |
          git config user.name "aeonframework"
          git config user.email "aeonframework@proton.me"
          rm -f ./notify

          CURRENT_BRANCH=$(git branch --show-current)
          SOURCE="$_COMMIT_SOURCE"

          if [ "$CURRENT_BRANCH" != "main" ] && [ -n "$CURRENT_BRANCH" ]; then
            echo "On feature branch: $CURRENT_BRANCH"
            git add -A
            git diff --staged --quiet || git commit -m "chore($SOURCE): auto-commit $(date +%Y-%m-%d)"
            git push --force-with-lease -u origin "$CURRENT_BRANCH" || true

            git checkout -f main
            git pull --rebase origin main || true
          fi

          git add -A
          git diff --staged --quiet && exit 0
          git commit -m "chore($SOURCE): auto-commit $(date +%Y-%m-%d)"
          JITTER=$((RANDOM % 10))
          echo "Waiting ${JITTER}s jitter before push..."
          sleep "$JITTER"
          for i in 1 2 3 4 5; do
            if git pull --rebase origin main; then
              git push -u origin HEAD && exit 0
            else
              echo "Rebase conflict on attempt $i, auto-resolving..."
              for f in $(git diff --name-only --diff-filter=U); do
                if [[ "$f" == memory/logs/* ]] || [[ "$f" == memory/topics/* ]] || [[ "$f" == memory/MEMORY.md ]]; then
                  sed -i '/^<<<<<<< /d; /^=======/d; /^>>>>>>> /d' "$f"
                  git add "$f"
                else
                  git checkout --theirs "$f"
                  git add "$f"
                fi
              done
              if git diff --cached --quiet; then
                git rebase --skip
              else
                GIT_EDITOR=true git rebase --continue
              fi
            fi
            BACKOFF=$(( (2 ** i) + RANDOM % 5 ))
            echo "Push attempt $i failed, retrying in ${BACKOFF}s..."
            sleep "$BACKOFF"
          done
          echo "Failed to push after 5 attempts"
          exit 1
